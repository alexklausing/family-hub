services:
    laravel.test:
        build:
            context: .
            dockerfile: Dockerfile
        user: sail
        working_dir: /var/www/html
        volumes:
            - '.:/var/www/html'
        networks:
            - sail
        depends_on:
            - db
            - selenium
            - redis
            - meilisearch
        environment:
            XDG_CONFIG_HOME: /tmp
            APP_KEY: '${APP_KEY}'
            APP_ENV: '${APP_ENV:-local}'
        ports:
            - '${VITE_PORT:-5173}:${VITE_PORT:-5173}'

    web:
        image: 'nginx:alpine'
        volumes:
            - '.:/var/www/html'
            - './docker/nginx.conf:/etc/nginx/conf.d/default.conf'
        ports:
            - '${APP_PORT:-8000}:80'
        depends_on:
            - laravel.test
        networks:
            - sail

    db:
        image: 'postgres:16'
        environment:
            POSTGRES_DB: '${DB_DATABASE:-family_hub}'
            POSTGRES_USER: '${DB_USERNAME:-sail}'
            POSTGRES_PASSWORD: '${DB_PASSWORD:-password}'
        ports:
            - '${FORWARD_DB_PORT:-5432}:5432'
        volumes:
            - 'sail-postgres:/var/lib/postgresql/data'
        networks:
            - sail

    redis:
        image: 'redis:alpine'
        ports:
            - '${FORWARD_REDIS_PORT:-6379}:6379'
        volumes:
            - 'sail-redis:/data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - redis-cli
                - ping
            retries: 3
            timeout: 5s

    meilisearch:
        image: 'getmeili/meilisearch:latest'
        ports:
            - '${FORWARD_MEILISEARCH_PORT:-7700}:7700'
        environment:
            MEILI_NO_ANALYTICS: '${MEILISEARCH_NO_ANALYTICS:-false}'
        volumes:
            - 'sail-meilisearch:/meili_data'
        networks:
            - sail
        healthcheck:
            test:
                - CMD
                - wget
                - '--no-verbose'
                - '--spider'
                - 'http://127.0.0.1:7700/health'
            retries: 3
            timeout: 5s

    mailpit:
        image: 'axllent/mailpit:latest'
        ports:
            - '${FORWARD_MAILPIT_PORT:-1025}:1025'
            - '${FORWARD_MAILPIT_DASHBOARD_PORT:-8025}:8025'
        networks:
            - sail

    selenium:
        image: 'seleniarm/standalone-chromium:latest'
        stdin_open: true
        tty: true
        ports:
            - '${FORWARD_SELENIUM_PORT:-4444}:4444'
            - '${FORWARD_SELENIUM_VNC_PORT:-7900}:7900'
        shm_size: 2gb
        networks:
            - sail

networks:
    sail:
        driver: bridge

volumes:
    sail-redis:
        driver: local
    sail-meilisearch:
        driver: local
    sail-postgres:
        driver: local
